[KITE]
# Your Zerodha Kite API key
api_key = YOUR_API_KEY

# Your Zerodha Kite API secret
api_secret = YOUR_API_SECRET

# Access token will be automatically populated after the first login
access_token = 

# Timestamp of the last successful token generation
token_timestamp = 

[DATA]
# Name of the instrument (for file naming and display)
instrument_name = NIFTY 50

# Instrument token from Kite API. Find more at https://api.kite.trade/instruments
instrument_token = 256265

# Time interval for the data (e.g., 5minute, 15minute, day, week, month)
time_interval = 5minute

# Number of years of historical data to download
time_period_years = 3

# Folder to save the downloaded data
output_folder = data

# The start date for downloading data in YYYY-MM-DD format
start_date = 2022-01-01

